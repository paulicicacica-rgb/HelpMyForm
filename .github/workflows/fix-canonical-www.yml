name: Fix Canonical WWW

on:
  workflow_dispatch:

jobs:
  fix-canonical:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fix script
        run: python fix_canonical_www.py
        - name: Fix sitemap.xml
        run: python fix_sitemap_www.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "fix: replace non-www canonicals with www site-wide"
          git push
