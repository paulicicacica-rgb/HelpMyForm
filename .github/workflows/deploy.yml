name: Inject Schema

on:
  workflow_dispatch:

jobs:
  inject-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Run schema injection script
        run: python inject_schema.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-inject schema"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Vercel
        run: curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_kkhosX2cx6IA8XzwOVEQrAbYGsUh/fYc0zBDFx2"
