<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>HelpMyForm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --bg2: #ede7df;
    --surface: #ffffff;
    --surface2: #faf7f4;
    --border: #e0d8cf;
    --border2: #cfc5ba;
    --ink: #1a1612;
    --ink2: #6b5f54;
    --ink3: #a89d94;
    --accent: #2d6a4f;
    --accent-light: #e8f4ef;
    --accent-mid: #52b788;
    --warm: #c9562a;
    --warm-light: #fdf0eb;
    --gold: #b5832a;
    --gold-light: #fdf6e7;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 2px 12px rgba(26,22,18,0.08);
    --shadow-lg: 0 8px 32px rgba(26,22,18,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    overflow: hidden;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateY(10px);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: var(--bg);
  }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

  .btn-primary {
    width: 100%; padding: 17px 24px;
    background: var(--accent); border: none;
    border-radius: var(--radius); color: #fff;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  .btn-secondary {
    width: 100%; padding: 15px 24px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--ink2);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: border-color 0.2s; margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-secondary:active { border-color: var(--accent); color: var(--accent); }

  /* HOME */
  #screen-home { justify-content: space-between; overflow: hidden; }

  .home-top {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 60px 28px 32px; position: relative;
  }
  .home-top::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-mid) 50%, var(--gold) 100%);
  }

  .brand-lockup { text-align: center; padding-top: 20px; }

  .brand-icon {
    width: 72px; height: 72px; background: var(--accent);
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; box-shadow: 0 4px 20px rgba(45,106,79,0.25);
    cursor: pointer; position: relative; overflow: hidden;
  }
  .brand-icon::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .brand-icon svg { width: 34px; height: 34px; fill: white; position: relative; z-index: 1; }

  .brand-name {
    font-family: 'Fraunces', serif; font-size: 34px; font-weight: 500;
    color: var(--ink); letter-spacing: -0.5px; line-height: 1; margin-bottom: 8px;
  }
  .brand-name span { color: var(--accent); }
  .brand-tagline { font-size: 15px; color: var(--ink2); font-weight: 400; line-height: 1.5; }

  /* LANGUAGE PILL - floating bottom left */
  .lang-pill {
    position: fixed;
    bottom: 44px;
    left: 20px;
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink2);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .lang-pill:active { border-color: var(--accent); }
  .lang-pill-flag { font-size: 16px; line-height: 1; }
  .lang-pill-caret { font-size: 9px; color: var(--ink3); margin-left: 2px; }

  /* LANGUAGE SHEET */
  .lang-sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(26,22,18,0.4);
    backdrop-filter: blur(2px);
    z-index: 150;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .lang-sheet-overlay.open { opacity: 1; pointer-events: all; }

  .lang-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 12px 0 44px;
    z-index: 151;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 75vh;
    display: flex;
    flex-direction: column;
  }
  .lang-sheet.open { transform: translateY(0); }

  .lang-sheet-handle {
    width: 36px; height: 4px;
    background: var(--border2);
    border-radius: 100px;
    margin: 0 auto 16px;
    flex-shrink: 0;
  }
  .lang-sheet-title {
    font-size: 11px; font-weight: 600; color: var(--ink3);
    letter-spacing: 1px; text-transform: uppercase;
    padding: 0 20px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .lang-sheet-list {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
  }
  .lang-option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    font-size: 15px; font-weight: 500; color: var(--ink);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lang-option:last-child { border-bottom: none; }
  .lang-option:active { background: var(--accent-light); }
  .lang-option.selected { color: var(--accent); }
  .lang-option.selected::after { content: '\u2713'; margin-left: auto; font-weight: 700; color: var(--accent); }
  .lang-option-flag { font-size: 20px; width: 28px; text-align: center; }

  .home-bottom {
    padding: 20px 28px 44px; background: var(--surface);
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(26,22,18,0.06);
  }
  .scan-counter { text-align: center; font-size: 12px; color: var(--ink3); margin-top: 12px; font-weight: 500; }
  .scan-counter.warning { color: var(--warm); }
  .scan-counter.success { color: var(--accent); font-weight: 600; }

  /* SCREEN HEADER */
  .screen-header {
    padding: 56px 28px 22px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  .screen-header h2 {
    font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500;
    color: var(--ink); margin-bottom: 4px; letter-spacing: -0.3px;
  }
  .screen-header p { color: var(--ink2); font-size: 14px; line-height: 1.6; }

  .screen-body { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* CAMERA */
  #screen-camera { padding: 0; }
  .upload-zone {
    margin: 20px 24px 0; min-height: 210px;
    border: 2px dashed var(--border2); border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    background: var(--surface); position: relative; overflow: hidden; box-shadow: var(--shadow);
  }
  .upload-zone:active { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone.has-image { border-style: solid; border-color: var(--accent); }
  #preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: calc(var(--radius) - 2px); display: none; }
  .upload-zone.has-image #preview-img { display: block; }
  .upload-zone.has-image .upload-placeholder { display: none; }
  .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; padding: 20px; }
  .upload-icon-wrap { width: 56px; height: 56px; background: var(--accent-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .upload-icon-wrap svg { width: 26px; height: 26px; }
  .upload-text { font-size: 15px; color: var(--ink2); text-align: center; font-weight: 500; }
  .upload-sub { font-size: 12px; color: var(--ink3); }

  .camera
