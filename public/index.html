<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>HelpMyForm</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f5f0eb; --bg2:#ede7df; --surface:#ffffff; --surface2:#faf7f4;
  --border:#e0d8cf; --border2:#cfc5ba;
  --ink:#1a1612; --ink2:#6b5f54; --ink3:#a89d94;
  --accent:#2d6a4f; --accent-light:#e8f4ef; --accent-mid:#52b788;
  --warm:#c9562a; --gold:#b5832a;
  --radius:18px; --radius-sm:12px;
  --shadow:0 2px 12px rgba(26,22,18,0.08);
  --shadow-lg:0 8px 32px rgba(26,22,18,0.12);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;background:var(--bg);color:var(--ink);
  font-family:'Instrument Sans',sans-serif;font-size:16px;
  line-height:1.5;overflow:hidden;
}

/* SCREENS */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  transform:translateY(10px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--bg);
}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* BUTTONS */
.btn-primary{
  width:100%;padding:17px 24px;
  background:var(--accent);border:none;
  border-radius:var(--radius);color:#fff;
  font-size:16px;font-weight:600;cursor:pointer;
  transition:transform .12s,opacity .12s;
  display:flex;align-items:center;justify-content:center;
}
.btn-primary:active{transform:scale(.98);opacity:.9;}

.btn-secondary{
  width:100%;padding:15px 24px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--ink2);font-size:15px;font-weight:500;
  margin-top:10px;cursor:pointer;
}
.btn-secondary:active{border-color:var(--accent);color:var(--accent);}

/* HOME */
#screen-home{justify-content:space-between;overflow:hidden;}
.home-top{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 28px 32px;position:relative;
}
.home-top::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent-mid),var(--gold));
}
.brand-icon{
  width:72px;height:72px;background:var(--accent);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;box-shadow:0 4px 20px rgba(45,106,79,0.25);
}
.brand-name{
  font-family:'Fraunces',serif;font-size:34px;font-weight:500;
}
.brand-name span{color:var(--accent);}
.brand-tagline{font-size:15px;color:var(--ink2);}

.home-bottom{
  padding:20px 28px 44px;background:var(--surface);
  border-top:1px solid var(--border);
  box-shadow:0 -4px 20px rgba(26,22,18,0.06);
}

/* FLOATING LANGUAGE PILL */
.lang-pill{
  position:fixed;bottom:44px;left:20px;z-index:40;
  display:flex;align-items:center;gap:7px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:100px;padding:9px 14px;
  font-size:13px;font-weight:500;color:var(--ink2);
  cursor:pointer;box-shadow:var(--shadow);
}
.lang-pill:active{border-color:var(--accent);}
.lang-pill-flag{font-size:16px;}
.lang-pill-caret{font-size:9px;color:var(--ink3);}

/* SHEET */
.lang-sheet-overlay{
  position:fixed;inset:0;background:rgba(26,22,18,0.4);
  backdrop-filter:blur(2px);z-index:150;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.lang-sheet-overlay.open{opacity:1;pointer-events:all;}

.lang-sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-radius:24px 24px 0 0;
  padding:12px 0 44px;z-index:151;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.lang-sheet.open{transform:translateY(0);}
.lang-sheet-handle{
  width:36px;height:4px;background:var(--border2);
  border-radius:100px;margin:0 auto 16px;
}
.lang-sheet-title{
  font-size:11px;font-weight:600;color:var(--ink3);
  letter-spacing:1px;text-transform:uppercase;
  padding:0 20px 12px;border-bottom:1px solid var(--border);
}
.lang-option{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;font-size:15px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.lang-option:last-child{border-bottom:none;}
.lang-option.selected{color:var(--accent);}
.lang-option.selected::after{
  content:'✓';margin-left:auto;font-weight:700;color:var(--accent);
}
</style>
</head>

<body>

<div class="screen active" id="screen-home">
  <div class="home-top">
    <div class="brand-icon"></div>
    <div class="brand-name">Help<span>MyForm</span></div>
    <div class="brand-tagline">Understand forms instantly.</div>
  </div>

  <div class="home-bottom">
    <button class="btn-primary">Scan a Form</button>
    <button class="btn-secondary">Upload Instead</button>
  </div>
</div>

<!-- LANGUAGE PILL -->
<div class="lang-pill" onclick="toggleLangSheet()">
  <span class="lang-pill-flag" id="current-lang-flag">🇺🇸</span>
  <span id="current-lang-label">English</span>
  <span class="lang-pill-caret">▾</span>
</div>

<!-- OVERLAY -->
<div class="lang-sheet-overlay" id="lang-overlay" onclick="closeLangSheet()"></div>

<!-- BOTTOM SHEET -->
<div class="lang-sheet" id="lang-sheet">
  <div class="lang-sheet-handle"></div>
  <div class="lang-sheet-title">Select Language</div>

  <div class="lang-option selected" onclick="setLanguage('en','🇺🇸','English',this)">
    🇺🇸 English
  </div>
  <div class="lang-option" onclick="setLanguage('es','🇪🇸','Español',this)">
    🇪🇸 Español
  </div>
  <div class="lang-option" onclick="setLanguage('fr','🇫🇷','Français',this)">
    🇫🇷 Français
  </div>
  <div class="lang-option" onclick="setLanguage('de','🇩🇪','Deutsch',this)">
    🇩🇪 Deutsch
  </div>
</div>

<script>
function toggleLangSheet(){
  document.getElementById('lang-overlay').classList.add('open');
  document.getElementById('lang-sheet').classList.add('open');
}
function closeLangSheet(){
  document.getElementById('lang-overlay').classList.remove('open');
  document.getElementById('lang-sheet').classList.remove('open');
}
function setLanguage(code,flag,label,el){
  document.getElementById('current-lang-flag').textContent=flag;
  document.getElementById('current-lang-label').textContent=label;
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  closeLangSheet();
  localStorage.setItem('appLanguage',code);
}
</script>

</body>
</html>
