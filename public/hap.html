<!-- 🔥 AUTO INTERNAL LINKING -->
<script>
(function () {
  const linkMap = [
    { keyword: "PPS Number", url: "/pps" },
    { keyword: "Medical Card", url: "/medical-card" },
    { keyword: "Rent Supplement", url: "/rent-supplement" }
  ];

  const content = document.querySelector(".content");
  if (!content) return;

  linkMap.forEach(item => {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);

    let node;
    let done = false;

    while ((node = walker.nextNode()) && !done) {
      if (node.parentNode.tagName === "A") continue;

      const text = node.nodeValue;
      const index = text.toLowerCase().indexOf(item.keyword.toLowerCase());

      if (index !== -1) {
        const span = document.createElement("span");

        const before = text.slice(0, index);
        const match = text.slice(index, index + item.keyword.length);
        const after = text.slice(index + item.keyword.length);

        span.innerHTML = `${before}<a href="${item.url}" style="color:var(--accent);font-weight:500;">${match}</a>${after}`;

        node.parentNode.replaceChild(span, node);
        done = true;
      }
    }
  });
})();
</script>
