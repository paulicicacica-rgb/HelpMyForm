# inject_hreflang.py — updated for HelpMyForm repo structure
from bs4 import BeautifulSoup
import os

BASE = "https://www.helpmyform.com"

# Define every page group: { slug: { lang_code: relative_url } }
GROUPS = {
    "hap": {
        "en":  "/hap.html",
        "pt":  "/pt/hap.html",
        "ro":  "/ro/hap.html",
        "pl":  "/pl/hap.html",
        "uk":  "/uk/hap.html",
        "so":  "/so/hap.html",
    },
    "pps": {
        "en":  "/pps.html",
        "pt":  "/pt/pps.html",
        "ro":  "/ro/pps.html",
        "pl":  "/pl/pps.html",
        "uk":  "/uk/pps.html",
        "so":  "/so/pps.html",
    },
    "medical-card": {
        "en":  "/medical-card.html",
        "pt":  "/pt/medical-card.html",
        "ro":  "/ro/medical-card.html",
        "pl":  "/pl/medical-card.html",
        "uk":  "/uk/medical-card.html",
    },
    "irp": {
        "en":  "/irp.html",
        "pt":  "/pt/irp.html",
        "so":  "/so/irp.html",
    },
    "jobseeker": {
        "en":  "/jobseeker.html",
        "pt":  "/pt/jobseeker.html",
        "ro":  "/ro/jobseeker.html",
        "pl":  "/pl/jobseeker.html",
        "uk":  "/uk/jobseeker.html",
        "so":  "/so/jobseeker.html",
    },
    "temporary-protection": {
        "en":  "/temporary-protection.html",
    },
    "index": {
        "en":  "/index.html",
    },
    # Ukrainian-only pages
    "child-benefit": {
        "uk":  "/uk/child-benefit.html",
    },
    "education": {
        "uk":  "/uk/education.html",
    },
}

# Map each file path -> which group it belongs to + its own lang/url
FILE_MAP = {}
for slug, langs in GROUPS.items():
    for lang, url in langs.items():
        # Build filesystem path (relative to site root)
        filepath = url.lstrip("/")
        FILE_MAP[filepath] = {"slug": slug, "self_url": BASE + url}

def inject_hreflang(filepath, slug, self_url):
    if not os.path.exists(filepath):
        print(f"  SKIP (not found): {filepath}")
        return

    with open(filepath, "r", encoding="utf-8") as f:
        content = f.read()

    soup = BeautifulSoup(content, "html.parser")

    # Remove any existing hreflang / canonical we'll re-add
    for tag in soup.find_all("link", rel=lambda r: r and ("alternate" in r or "canonical" in r)):
        tag.decompose()

    head = soup.find("head")
    if not head:
        print(f"  SKIP (no <head>): {filepath}")
        return

    # Build hreflang tags for this group
    group = GROUPS[slug]
    new_tags = []

    for lang, url in group.items():
        tag = soup.new_tag("link", rel="alternate", hreflang=lang, href=BASE + url)
        new_tags.append(tag)

    # x-default points to English if exists, else first
    default_url = group.get("en", list(group.values())[0])
    xdef = soup.new_tag("link", rel="alternate", hreflang="x-default", href=BASE + default_url)
    new_tags.append(xdef)

    # Canonical points to self
    canonical = soup.new_tag("link", rel="canonical", href=self_url)
    new_tags.append(canonical)

    # Insert before </head>
    for tag in new_tags:
        head.append(tag)
        head.append("\n")

    with open(filepath, "w", encoding="utf-8") as f:
        f.write(str(soup))

    print(f"  ✓ {filepath}")

print("=== Injecting hreflang + canonical tags ===\n")
for filepath, meta in FILE_MAP.items():
    inject_hreflang(filepath, meta["slug"], meta["self_url"])

print("\n=== Done ===")

